spring:
  application:
    name: comparador-planos-ensino
  datasource:
    url: jdbc:mariadb://localhost:3306/fatec-comparador?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
server:
  error:
    include-message: always

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.web: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-docs-ui

app:
  cors:
    allowed-origins:
      - "*"
  embeddings:
    word2vec:
      location: classpath:embeddings/sample-word2vec.txt
      dimension: 3
      max-vocabulary: 10000
